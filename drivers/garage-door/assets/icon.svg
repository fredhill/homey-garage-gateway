<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Garage door icon: panelled door with frame -->
  <!-- Frame -->
  <rect x="14" y="14" width="72" height="72" rx="3" ry="3" fill="#1F4E79"/>
  <!-- Inner door area -->
  <rect x="22" y="22" width="56" height="56" fill="#0F2D4B"/>
  <!-- Horizontal panels -->
  <rect x="22" y="22" width="56" height="12" fill="#1F4E79"/>
  <rect x="22" y="36" width="56" height="12" fill="#1F4E79"/>
  <rect x="22" y="50" width="56" height="12" fill="#1F4E79"/>
  <rect x="22" y="64" width="56" height="12" fill="#1F4E79"/>
  <!-- Window slots on the top panel -->
  <rect x="30" y="26" width="8" height="4" fill="#fff" opacity="0.85"/>
  <rect x="46" y="26" width="8" height="4" fill="#fff" opacity="0.85"/>
  <rect x="62" y="26" width="8" height="4" fill="#fff" opacity="0.85"/>
  <!-- Handle -->
  <rect x="48" y="72" width="4" height="3" fill="#fff" opacity="0.9"/>
</svg>

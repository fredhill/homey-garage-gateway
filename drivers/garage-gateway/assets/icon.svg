<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- iSmartGate hub icon: controller box with LED + antenna + wifi arcs -->
  <rect x="14" y="30" width="72" height="44" rx="6" ry="6" fill="#1F4E79"/>
  <!-- Brand stripe -->
  <rect x="14" y="30" width="72" height="6" rx="6" ry="6" fill="#0F2D4B"/>
  <!-- Status LEDs -->
  <circle cx="26" cy="58" r="3.5" fill="#fff" opacity="0.95"/>
  <circle cx="38" cy="58" r="3.5" fill="#fff" opacity="0.65"/>
  <circle cx="50" cy="58" r="3.5" fill="#fff" opacity="0.4"/>
  <!-- Antenna -->
  <line x1="76" y1="30" x2="76" y2="14" stroke="#1F4E79" stroke-width="4" stroke-linecap="round"/>
  <circle cx="76" cy="14" r="3.5" fill="#1F4E79"/>
  <!-- WiFi arcs -->
  <path d="M58 56 Q72 44 72 60" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M62 58 Q70 50 70 60" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.85"/>
</svg>
